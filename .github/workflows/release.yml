name: Release

permissions:
  contents: write
  packages: write

env:
  MIX_ENV: prod
  ELIXIR_VERSION: "1.19.0"
  OTP_VERSION: "28.2"

on:
  push:
    tags:
      - "v*"

jobs:
  # Gate: CI must pass before building releases
  ci:
    name: CI Check
    uses: ./.github/workflows/ci-unified.yml
    with:
      skip_heavy_checks: true

  build:
    name: Build (${{ matrix.os }})
    needs: ci
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-13
            target: macos-amd64
          - os: macos-latest
            target: macos-arm64
    steps:
      - uses: actions/checkout@v5

      - name: Cache Mix dependencies
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            ~/.hex
            ~/.mix
          key: release-${{ matrix.target }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.clean --unused
          mix deps.get

      - name: Build release
        run: mix release

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd _build/prod/rel/raxol
          tar czf "raxol-${VERSION}-${{ matrix.target }}.tar.gz" .
          shasum -a 256 "raxol-${VERSION}-${{ matrix.target }}.tar.gz" > "raxol-${VERSION}-${{ matrix.target }}.tar.gz.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            _build/prod/rel/raxol/raxol-*-${{ matrix.target }}.tar.gz
            _build/prod/rel/raxol/raxol-*-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/raxol-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to Hex
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Install dependencies
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.clean --unused
          mix deps.get

      - name: Publish to Hex
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: mix hex.publish --yes
